dbt_qam:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('PG_HOST', 'localhost') }}"
      port: "{{ env_var('PG_PORT', '5432') | int }}"
      user: "{{ env_var('PG_USER', 'postgres') }}"
      pass: "{{ env_var('PG_PASSWORD', 'postgres') }}"
      dbname: "{{ env_var('DB_NAME', 'qam_db') }}"
      schema: public
      threads: 1
    airflow:
      type: postgres
      host: "{{ env_var('PG_HOST', 'postgres') }}"
      port: "{{ env_var('PG_PORT', '5432') | int }}"
      user: "{{ env_var('PG_USER', 'postgres') }}"
      pass: "{{ env_var('PG_PASSWORD', 'postgres') }}"
      dbname: "{{ env_var('DB_NAME', 'qam_db') }}"
      schema: public
      threads: 1
